# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Epic Status Transitions:
#   - backlog → in-progress: Automatically when first story is created (via create-story)
#   - in-progress → done: Manually when all stories reach 'done' status
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created in stories folder
#   - in-progress: Developer actively working on implementation
#   - review: Ready for code review (via Dev's code-review workflow)
#   - done: Story completed
#
# Retrospective Status:
#   - optional: Can be completed but not required
#   - done: Retrospective has been completed
#
# Action Item Status:
#   - open: Committed during a retrospective, not yet addressed
#   - in-progress: Actively being worked on
#   - done: Completed
#
# WORKFLOW NOTES:
# ===============
# - Epic transitions to 'in-progress' automatically when first story is created
# - Stories can be worked in parallel if team capacity allows
# - Developer typically creates next story after previous one is 'done' to incorporate learnings
# - Dev moves story to 'review', then runs code-review (fresh context, different LLM recommended)
# - Retrospective appends its action items to action_items; sprint-status surfaces open ones
#
# SEQUENCING PLAN (order below = planned work order):
# ===================================================
# - Story 1-4 (template-consistency verification) is deliberately first: it de-risks
#   the top extraction threat (silent mid-tournament template revision) and gates
#   confidence in everything downstream in Epic 1. Its first run is anchor-level only
#   (no extractors yet) and pulls forward a minimal text-anchored discovery slice from 1-2;
#   it is re-run as a gate by every subsequent extraction story.
# - Story 1-1 (contract v1 + fixtures) is second: fixtures/sample bundles are Epic 2's
#   unblocking artifact (AD-14). No Epic 2 story starts before 1-1 is done.
# - Story 1-5 (marker → event-row linking) gates ALL spatial-join stories: it precedes
#   1-11/1-12/1-13/1-14 in Epic 1 and is a data prerequisite for Epic 2's shot-map
#   surfaces with time/player/xG (2-7 onward).
# - Epic 2 interleaves with Epic 1 once 1-1 lands: schema-only stories (2-1, 2-2, 2-3,
#   and fixture-driven UI stories) may proceed against data/fixtures/; stories needing
#   real data at scale (2-19) wait on 1-19.
# - Story 2-1 (i18n scaffolding + tokens + build gates) is first within Epic 2 — never
#   retrofitted. Story 2-3 (contract sign-off) gates Epic 1 proceeding past the sample set.

